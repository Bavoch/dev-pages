<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>测试页面</title>
    <style>
        /* 重置特定容器内的样式 */
        .quote-page-container {
            all: initial;
            /* 确保容器占满整个视口 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 基础样式 */
            background-color: #1a1a1a;
            color: rgba(255, 255, 255, 1);
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            z-index: 9999;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 亮色主题样式 */
        .quote-page-container.light-theme {
            background-color: #f5f5f5;
            color: rgba(0, 0, 0, 0.7);
        }

        /* 所有样式都限定在容器内 */
        .quote-page-container .welcome-text {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 主图片样式 */
        .main-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .main-image:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
        }

        .main-image.drag-over {
            outline: 2px dashed rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }

        .quote-page-container.light-theme .main-image.drag-over {
            outline-color: rgba(0, 0, 0, 0.4);
        }

        .main-image:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
        }

        /* 亮色主题下的图片样式 */
        .quote-page-container.light-theme .main-image {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .quote-page-container.light-theme .main-image:hover {
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.15);
        }

        .quote-page-container h1 {
            font-size: 3em;
            font-weight: 400;
        }

        .quote-page-container p {
            font-size: 1em;
            font-weight: 400;
            opacity: 0.5;
        }

        .quote-page-container button {
            margin-top: 2em;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #ffffff16;
            color: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            width: fit-content;
        }

        .quote-page-container button:hover {
            background-color: #ffffff2e;
        }

        .quote-page-container button:active {
            background-color: #ffffff2b;
            transform: scale(0.95);
        }

        /* 调整亮色主题下的按钮样式 */
        .quote-page-container.light-theme button {
            background-color: #00000016;
            color: rgba(0, 0, 0, 0.749);
        }

        .quote-page-container.light-theme button:hover {
            background-color: #0000002e;
        }

        .quote-page-container.light-theme button:active {
            background-color: #0000002b;
        }

        /* 文字按钮样式 */
        .text-button {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 5px 10px !important;
            font-size: 1em !important;
            background-color: transparent !important;
            color: rgba(255, 255, 255, 0.4) !important;
            border: none !important;
            cursor: pointer !important;
            transition: all 0.3s !important;
            margin: 0 !important;
        }

        .text-button:hover {
            color: rgba(255, 255, 255, 0.6) !important;
            background-color: transparent !important;
        }

        /* 亮色主题下的文字按钮样式 */
        .quote-page-container.light-theme .text-button {
            color: rgba(0, 0, 0, 0.4) !important;
        }

        .quote-page-container.light-theme .text-button:hover {
            color: rgba(0, 0, 0, 0.6) !important;
        }

        /* 日期样式 - 调整数字和文字的一致性 */
        .quote-page-container #date {
            font-size: 1.5em;
            font-weight: 400;
            opacity: 0.5;
            margin-top: 0;
            margin-bottom: 0.2em;
            -webkit-font-smoothing: antialiased;
        }

        /* 标题样式 */
        .quote-page-container #title {
            font-size: 1.5em;
            font-weight: 400;
            opacity: 0.7;
            outline: none;
            border: 1px dashed transparent;
            border-radius: 4px;
            padding: 2px 8px;
            transition: border-color 0.3s;
            cursor: text;
        }

        .quote-page-container #title:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .quote-page-container #title:focus {
            border-color: rgba(255, 255, 255, 0.4);
            opacity: 1;
        }

        .quote-page-container.light-theme #title:hover {
            border-color: rgba(0, 0, 0, 0.15);
        }

        .quote-page-container.light-theme #title:focus {
            border-color: rgba(0, 0, 0, 0.3);
        }

        /* 时间样式 - 突出显示 */
        .quote-page-container #time {
            font-size: 8em;
            font-weight: 300;
            opacity: 0.6;
            margin-top: 0;
            margin-bottom: 0;
        }

        /* 亮色主题下的特殊调整 */
        .quote-page-container.light-theme #date {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="quote-page-container" id="container">
        <div class="welcome-text">
            <img src="image.jpg" alt="展示图片" class="main-image" id="mainImage">
            <input type="file" id="imageInput" accept="image/*" style="display:none">
            <div id="title" contenteditable="true" spellcheck="false">标题</div>
            <h1 id="time"></h1>
            <h1 id="date"></h1>
            <script>
                function updateDateTime() {
                    const now = new Date();
                    // 修改日期格式化，使用更可靠的方式
                    const dateOptions = {
                        year: 'numeric',
                        month: 'numeric',
                        day: 'numeric'
                    };
                    let dateStr;
                    try {
                        // 首选中文格式
                        dateStr = now.toLocaleDateString('zh-CN', dateOptions)
                            .replace('/', '年')
                            .replace('/', '月') + '日';
                    } catch (e) {
                        // 如果中文格式失败，回退到通用格式
                        dateStr = now.toLocaleDateString('en', dateOptions)
                            .replace(/\//g, '-');
                    }
                    
                    // 修改时间格式化，添加错误处理
                    const timeOptions = {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false // 确保使用24小时制
                    };
                    let timeStr;
                    try {
                        timeStr = now.toLocaleTimeString('zh-CN', timeOptions);
                    } catch (e) {
                        timeStr = now.toLocaleTimeString('en', timeOptions);
                    }
                    
                    document.getElementById('date').textContent = dateStr;
                    document.getElementById('time').textContent = timeStr;
                }
                updateDateTime();
                setInterval(updateDateTime, 1000);
            </script>
            <button class="text-button" onclick="toggleTheme()">切换主题</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const container = document.getElementById('container');
            container.classList.toggle('light-theme');

            // 保存主题偏好到本地存储
            const isLight = container.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // 点击页面任意位置刷新
        document.getElementById('container').addEventListener('click', function(e) {
            if (e.target.classList.contains('text-button')) return;
            if (e.target.id === 'title') return;
            if (e.target.id === 'mainImage') return;
            location.reload();
        });

        // 图片替换功能
        const imgEl = document.getElementById('mainImage');
        const fileInput = document.getElementById('imageInput');

        // 恢复保存的图片
        const savedImage = localStorage.getItem('page-image');
        if (savedImage) imgEl.src = savedImage;

        function replaceImage(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                imgEl.src = e.target.result;
                localStorage.setItem('page-image', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 点击选择文件
        imgEl.addEventListener('click', function() {
            fileInput.click();
        });
        fileInput.addEventListener('change', function() {
            if (this.files[0]) replaceImage(this.files[0]);
        });

        // 粘贴图片
        document.addEventListener('paste', function(e) {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    replaceImage(items[i].getAsFile());
                    break;
                }
            }
        });

        // 拖拽图片
        imgEl.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.add('drag-over');
        });
        imgEl.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
        });
        imgEl.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) replaceImage(file);
        });

        // 标题编辑保存
        const titleEl = document.getElementById('title');
        const savedTitle = localStorage.getItem('page-title');
        if (savedTitle) titleEl.textContent = savedTitle;
        titleEl.addEventListener('input', function() {
            localStorage.setItem('page-title', this.textContent);
        });

        // 页面加载时恢复上次的主题设置
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.getElementById('container').classList.add('light-theme');
            }
        });
    </script>
</body>
</html>
